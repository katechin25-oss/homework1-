Author: Katherine Chin
Date created: 02/24/2026
Date last edited: 04/17/2026
Version: 3.0
Description: Patient registration form for MIS3371 Homework 3.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Registration - Homework 3</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<div id="header">
  <img src="CHIN MEDICAL CENTER.png" height="60">
  <div>
    <h1>Chin Medical Center</h1>
  </div>
</div>

<div id="main">
  <h2>New Patient Registration</h2>
  <form id="regForm" onsubmit="return validateForm()">
  <table>

    <tr><td colspan="6"><strong>--- Personal Information ---</strong></td></tr>
    <tr>
      <td><label for="fname">First Name:</label></td>
      <td>
        <input type="text" id="fname" name="fname" maxlength="30" oninput="validateName('fname', 'err-fname', 'fname')">
        <span class="err" id="err-fname"></span>
      </td>
      <td><label for="lname">Last Name:</label></td>
      <td>
        <input type="text" id="lname" name="lname" maxlength="30" oninput="validateName('lname', 'err-lname', 'lname')">
        <span class="err" id="err-lname"></span>
      </td>
    </tr>

    <tr>
      <td><label for="dob">Date of Birth:</label></td>
      <td>
        <input type="date" id="dob" name="dob" oninput="validateDOB()">
        <span class="err" id="err-dob"></span>
      </td>
      <td><label for="ssn">Social Security #:</label></td>
      <td>
        <input type="text" id="ssn" name="ssn" maxlength="11" placeholder="XXX-XX-XXXX" oninput="formatSSN(this)">
        <span class="err" id="err-ssn"></span>
      </td>
    </tr>

    <tr><td colspan="6"><strong>--- Contact Information ---</strong></td></tr>
    <tr>
      <td><label for="email">Email Address:</label></td>
      <td colspan="3">
        <input type="email" id="email" name="email" size="40" oninput="validateEmail()">
        <span class="err" id="err-email"></span>
      </td>
    </tr>

    <tr><td colspan="6"><strong>--- Location ---</strong></td></tr>
    <tr>
      <td><label for="zip">Zip:</label></td>
      <td>
        <input type="text" id="zip" name="zip" maxlength="5" oninput="validateZip()">
        <span class="err" id="err-zip"></span>
      </td>
    </tr>

    <tr><td colspan="6"><strong>--- Account Setup ---</strong></td></tr>
    <tr>
      <td><label for="userid">User ID:</label></td>
      <td>
        <input type="text" id="userid" name="userid" maxlength="20" oninput="validateUserId()">
        <span class="err" id="err-userid"></span>
      </td>
    </tr>
    <tr>
      <td><label for="pw">Password:</label></td>
      <td>
        <input type="password" id="pw" name="pw" oninput="validatePasswords()">
        <span class="err" id="err-pw"></span>
      </td>
    </tr>
    <tr>
      <td><label for="pw2">Re-enter Password:</label></td>
      <td>
        <input type="password" id="pw2" name="pw2" oninput="validatePasswords()">
        <span class="err" id="err-pw2"></span>
      </td>
    </tr>

    <tr>
      <td colspan="6" class="btn-row">
        <button type="submit" id="submitBtn" style="display:none;">SUBMIT</button>
      </td>
    </tr>

  </table>
  </form>
</div><script src="script.js"></script>
</body>
</html>
